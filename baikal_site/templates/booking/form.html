<!DOCTYPE html>
<html>
<head>
    <title>Добавление тура</title>
</head>

<body>

<h1>Добавить тур на Байкал</h1>

<form method="POST" enctype="multipart/form-data" id="tour-form">

{% csrf_token %}

<h2>Информация о туре</h2>
{{ tour_form.as_p }}

<h2>Бронирование</h2>
{{ booking_form.as_p }}

<h2>Фотография тура</h2>
{{ image_form.as_p }}

<button type="submit" form="tour-form">
Отправить данные
</button>

</form>

</body>
</html>
