<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Бронирование тура</title>

<style>

body{
font-family: Arial;
background:#f2f5f7;
}

.container{
width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.form-group{
margin-bottom:15px;
}

input,select{
width:100%;
padding:8px;
}

button{
padding:12px 25px;
background:#71b378;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;

display:block;
margin:20px auto;
}

button:hover{
background:#a9d0f8;
}

button:hover{
background:#0056b3;
}

.tour-card{
margin-top:20px;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
background:#fafafa;
}

.tour-card img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Бронирование тура</h1>

<form method="post" enctype="multipart/form-data">

{% csrf_token %}

<div class="form-group">
<label>Выберите тур</label>
{{ booking_form.tour }}
</div>

<div class="form-group">
<label>Ваше имя</label>
{{ booking_form.name }}
</div>

<div class="form-group">
<label>Email</label>
{{ booking_form.email }}
</div>

<div class="form-group">
<label>Дата тура</label>
{{ booking_form.tour_date }}
</div>

<div class="form-group">
<label>Количество человек</label>
{{ booking_form.people }}
</div>

<div class="form-group">
<label>Загрузите согласие (PDF, PNG, JPG)</label>
{{ consent_form.document }}
</div>

<button type="submit">Забронировать</button>

</form>

</div>

</body>
</html>
