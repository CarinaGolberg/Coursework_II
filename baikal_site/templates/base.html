<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Бронирование туров на Байкал{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/booking_form.css' %}">
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<nav class="nav">
    <a href="{% url 'home' %}">🏔️ Главная</a>
    <a href="{% url 'booking' %}">📅 Бронирование</a>
    <a href="{% url 'tour_list' %}">📋 Туры</a>
    
    {% if user.is_authenticated %}
        <a href="{% url 'accounts:profile' %}">👤 {{ user.username }}</a>
        <a href="{% url 'accounts:logout' %}">🚪 Выход</a>
    {% else %}
        <a href="{% url 'accounts:login' %}">🔑 Вход</a>
        <a href="{% url 'accounts:register' %}">📝 Регистрация</a>
    {% endif %}
</nav>

<main>
    {% if messages %}
        {% for message in messages %}
            <div class="message message-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    
    {% block content %}{% endblock %}
</main>

<script src="{% static 'js/booking_form.js' %}"></script>
</body>
</html>
